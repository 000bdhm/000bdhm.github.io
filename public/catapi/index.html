<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>catapi</title>
<meta property="og:title" content="🐱">
<meta property="og:type" content="website">
<meta property="og:description" content="random cat gif">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:system-ui,-apple-system,sans-serif}
.card{text-align:center;padding:2rem}
img{max-width:min(90vw,540px);max-height:70vh;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.5);display:block;margin:0 auto}
a{display:inline-block;margin-top:1.5rem;padding:.7rem 1.8rem;background:#1a1a1a;color:#f0f0f0;border:1px solid #333;border-radius:40px;font-size:.95rem;cursor:pointer;text-decoration:none;transition:.2s}
a:hover{background:#2a2a2a;border-color:#666}
a:active{transform:scale(.97)}
</style>
<div class="card">
<img id="c" alt="">
<a href="#" id="n">🐱 yeni kedi</a>
<a href="#" id="d" style="margin-left:.6rem">📋 discord'a kopyala</a>
</div>
<script>
var base = "https://catapi-lac.vercel.app";
function l(){var d=new Date;document.getElementById("c").src=base+"/catapi?raw&cb="+d.getTime()}
document.getElementById("n").addEventListener("click",function(e){e.preventDefault();l()});l()
function freshLink(){var u=Date.now().toString(36)+Math.random().toString(36).slice(2,10);return base+"/catapi?s="+u}
document.getElementById("d").addEventListener("click",function(e){
  e.preventDefault();
  var link=freshLink();
  navigator.clipboard.writeText(link).then(function(){
    var btn=document.getElementById("d");var old=btn.textContent;
    btn.textContent="✅ kopyalandı!";setTimeout(function(){btn.textContent=old},1500);
  });
});
</script>
</html>
